name: Draft auto-pick

# Free, host-agnostic alternative to Vercel Cron. On a schedule, this pokes the
# deployed app's idempotent tick endpoint, which auto-drafts the best available
# golfer whenever a pick clock has expired. Works no matter where you host.
#
# One-time setup (repo → Settings):
#   • Variables → New repository variable:  APP_URL = https://your-app.vercel.app
#   • Secrets   → New repository secret:     CRON_SECRET = (same value as the app's env)
#
# GitHub schedules run at ~5-minute granularity at best and may be delayed under
# load — fine for a 1-hour pick clock (a timeout resolves within a few minutes).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # allow manual runs from the Actions tab

# If a run overruns, don't pile up concurrent pokes.
concurrency:
  group: draft-autopick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Poke the draft clock
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::Set the APP_URL repository variable (e.g. https://your-app.vercel.app)"
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X GET "$APP_URL/api/draft/tick" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::tick endpoint returned $code"
            exit 1
          fi
